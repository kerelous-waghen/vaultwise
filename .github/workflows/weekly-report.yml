name: Weekly Financial Report

on:
  schedule:
    # Every Sunday at 2 PM UTC (6 AM PST / 9 AM EST)
    - cron: '0 14 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but do not send)'
        required: false
        default: 'false'
        type: boolean

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install kaleido

      - name: Generate and send weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python send_weekly_report.py --dry-run
          else
            python send_weekly_report.py
          fi
